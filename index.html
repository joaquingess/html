<!DOCTYPE html>                        <!--el navegador entiende que es html-->
<html lang="en">                        <!--apertura de etiqueta html la pagina esta en este idioma todo el codigo va dentro de html-->
<head>                                  <!--apertura de etiqueta head padre todo lo no visible-->
    <meta charset="UTF-8">              <!--protocolo para el navegador caracteres especiales-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!--se pueden escalar las imagenes y texto a movile o desktop sin hacer zoom-->
    <meta name="robots" content="index,follow">                             <!--los robots de los navegadores pueden buscar mi pagina-->                               
    <meta name="description" content="partes de html con comentarios">      <!--descripcion de la pagiana al momento de buscar-->
    <link rel="stylesheet" href="./css/style.css">                          <!--enlazar html con css-->
    <title>Comandos HTML</title>
</head>                                                                     <!--cierre de tiqueta head-->
<body>                                                                      <!--apertura de etiqueta body todo lo visible en el navegador-->
    <header>                                                                <!--etiqueta para logo y barra de una pagina web-->
        <nav>                                                               <!--etiqueta nav para la barra de naveacion-->
            <div>                                                           <!--etiqueta comodin div-->

            </div>
        </nav>
    </header>
    <main>                                                                  <!--etiqueta main para el contenido principal de una pagina web-->
        <section>                                                           <!--los main tienen secciones-->
            <article>                                                       <!--las secciones tienen articulos-->
                <ol>                                                        <!--lista ordenada con numeros-->
                    <li></li>                                               <!--etiqueta para agregar contenido de las listas-->
                </ol>
                <ul>                                                        <!--lista desordenada con puntos-->
                    <li></li>                                               <!--etiqueta para agregar contenido de las listas-->
                </ul>
            </article>
        </section>
    </main>
    <footer>                                                                <!--el footer tiene los derechos de autor o el contacto de la pagina-->

    </footer>
    <h1></h1>                                                               <!--etiqueta de titulos del h1 al h6-->
    <p></p>                                                                 <!--etiqueta para parrafos-->
    <a href="#"></a>                                                         <!--etiqueta de hipervinculos (sin el # recarga la pagina completa)-->
    <script src="/javascript.js"></script>                                  <!--enlace de html con js-->
</body>                                                                     <!--cierre de etiqueta body-->
</html>                                                                     <!--cierre de etiqueta html-->
