<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index,follow">
    <meta name="description" content="Usar la etiqueta figure para imagenes multimedia">
    <title>Etiqueta Figure</title>
</head>
<body>
    <main>
        <section>
            <article>
                <figure>                                                            <!--etiqueta para imagenes-->
                    <img src="./imagenes/perro del meme.jfif" alt="perro del meme"> <!--alt es descripcion-->
                </figure>
                <figcaption>                                                        <!--etiqueta para describir en texto la imagen en el navegador-->
                    imagen de un perrito
                </figcaption>
            </article>
        </section>
    </main>
</body>
</html>
